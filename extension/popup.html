<!DOCTYPE html>
<html>
<body style="width: 320px; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; background: #080808; color: white;">
  <h2 style="margin-top: 5px; color: #818cf8; font-size: 18px;">StudyVerse Tracker</h2>
  <p style="font-size: 12px; color: #9ca3af; margin-bottom: 20px;">Actively monitoring for web distractions.</p>
  
  <div style="background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 15px; text-align: left;">
    <h3 style="margin: 0 0 10px 0; font-size: 14px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 5px;">Today's Top Sites</h3>
    <div id="stats" style="font-size: 12px; color: #bbb; max-height: 150px; overflow-y: auto;">
       Loading...
    </div>
  </div>

  <button id="reset" style="padding: 8px 16px; background: #dc2626; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: opacity 0.2s;">Reset Data</button>
  <button id="openApp" style="padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;">View Full Analytics</button>
  <script src="popup.js"></script>
</body>
</html>
